<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>百年历史事件时间轴</title>

    <script src="./static/vis-timeline-graph2d.min.js"></script>
    <link href="./static/vis-timeline-graph2d.min.css" rel="stylesheet" type="text/css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"
        integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo=" crossorigin="anonymous"></script>


</head>

<body data-gr-c-s-loaded="true">

    <h3>百年事件 历史长河</h3>
    <div style="overflow: hidden; height: 75%">
        <div id="china">
            <img src="http://pic.wodingche.com/carimg/bpfiefz.jpeg" alt="">
        </div>
        <div id="inter">

        </div>
    </div>

    <div>
        <div id="mytimeline" style="height: 15%"></div>
        <input type="button" id="back" value="返回开头">
        <input type="button" id="start" value="开始">
        <input type="text" id="time" value="60">
    </div>

    <script>
        var container = document.getElementById('mytimeline');
        var global_data = null;
        var global_items = [];
        var timeline = null;
        currentTimeTimer = null;
        start_point = null;
        end_point = null;
        $.get("./history.csv", function (data) {
            global_data = data;
            var lines = data.split('\n')

            var items = new vis.DataSet();
            for (var i = 3; i < lines.length - 1; i++) {
                fields = lines[i].split(',')
                items.add({
                    id: i,
                    content: fields[1],
                    start: new Date(fields[0])
                });
                global_items.push(fields);
            }

            // Configuration for the Timeline
            // specify options
            start_point = new Date(lines[1].split(",")[0])
            end_point = new Date(lines[2].split(",")[0])
            var options = {
                start: start_point,
                end: new Date(start_point.getTime() + 12 * 30 * 24 * 60 * 60 * 1000),
            };

            // create a Timeline
            timeline = new vis.Timeline(container, items, null, options);
            walker_id = timeline.addCustomTime(start_point, 'walker');
        });
        function stop() {
            if (this.currentTimeTimer !== undefined) {
                clearTimeout(this.currentTimeTimer);
                delete this.currentTimeTimer;
            }
        }
        document.getElementById('start').onclick = function () {
            // timeline.moveTo('2019-10-01', { animation: { duration: $("#time").val() * 1000, easingFunction: 'linear' } });
            me = timeline;

            function update() {
                stop();
                // determine interval to refresh
                current_time = timeline.customTimes[0].getCustomTime();
                if (current_time.getTime() > end_point.getTime()) return;

                let interval = 40;
                const scale = (end_point.getTime() - start_point.getTime()) / interval / $("#time").val();
                timeline.customTimes[0].setCustomTime(new Date(current_time.getTime() + scale));

                // start a renderTimer to adjust for the new time
                currentTimeTimer = setTimeout(update, interval);
            }

            update();
        };
        document.getElementById('back').onclick = function () {
            timeline.moveTo('1919-05-04');
            stop();
            timeline.customTimes[0].setCustomTime(new Date(global_data.split('\n')[1].split(",")[0]));
        };

    </script>
</body>

</html>
